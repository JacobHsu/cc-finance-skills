name: Daily Top Losers Report

on:
  schedule:
    # 15:00 UTC = 10:00 AM EST (開盤後 30 分鐘，冬令時)
    # 15:00 UTC = 11:00 AM EDT (夏令時，開盤後 90 分鐘，仍在盤中)
    - cron: '0 15 * * 1-5'
  workflow_dispatch: # 允許手動觸發

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pytz pandas lxml

      - name: Run top losers script
        run: python scripts/top_losers.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/README.md
          git diff --cached --quiet || git commit -m "chore: update top losers report $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
