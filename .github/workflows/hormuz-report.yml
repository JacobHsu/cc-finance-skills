name: Hormuz Strait Report

on:
  schedule:
    # 每天 06:00 / 12:00 / 18:00 UTC 各更新一次
    - cron: '0 6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install deep-translator

      - name: Run hormuz report script
        run: python scripts/hormuz_report.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/hormuz.md
          git diff --cached --quiet || git commit -m "chore: update hormuz strait report $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
